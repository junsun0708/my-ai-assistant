services:
  my-ai-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-ai-assistant
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('8.8.8.8',53)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
